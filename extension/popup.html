<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
  <style>
    /* Inline layout overrides that Tailwind doesn't easily do in a static popup */
    .container {
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #4f46e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      font-weight: 600;
      outline: none;
      resize: none;
      height: 100px;
    }
    .footer {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .auth-view {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .auth-view.active {
      display: block;
    }
    .main-view {
      display: none;
    }
    .main-view.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="authView" class="auth-view">
    <div class="logo" style="margin: 0 auto 16px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
    </div>
    <h3 class="title" style="margin-bottom: 8px;">Restricted Access</h3>
    <p style="font-size: 14px; color: #94a3b8; margin-bottom: 24px;">Please log in to the web app to use the extension.</p>
    <button id="loginBtn" class="btn">Log In</button>
  </div>

  <div id="mainView" class="main-view container glass">
    <div class="header">
      <div class="logo shadow-lg shadow-indigo-500/30">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      </div>
      <span class="title tracking-tight">MindMark Snapshot</span>
    </div>

    <label class="label text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-400 mb-2 block">What is the very next step?</label>
    <textarea id="nextAction" class="input-focus" placeholder="e.g., Update the authentication middleware..." autofocus></textarea>

    <div class="footer">
      <div class="hint text-[10px] uppercase font-bold text-slate-500 tracking-wider">
        <span id="tabCount">0</span> Tabs harvested
      </div>
      <button id="saveBtn" class="btn-primary">Save Action</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
